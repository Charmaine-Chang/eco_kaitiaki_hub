{% extends 'base.html' %}
{% set active_page = 'stock_inventory' %}
{% block title %}Edit {{ item.item_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <h1 class="h4 fw-black text-forest mb-3">Update {{ item.item_name }}</h1>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Quantity</label>
                        <input type="number" step="any" min="0" name="quantity" class="form-control" value="{{ item.quantity }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Unit of Measure</label>
                        <input type="text" name="unit_of_measure" class="form-control" placeholder="e.g., kg, L, units, boxes" maxlength="50" value="{{ item.unit_of_measure or '' }}">
                    </div>
                    {% if session.get('role_id') in [ROLE_SUPER_ADMIN, ROLE_COORDINATOR] %}
                    <div class="mb-4">
                        <label class="form-label fw-bold small">Re-order threshold</label>
                        <input type="number" step="any" min="0" name="threshold" class="form-control" value="{{ item.threshold }}" required>
                    </div>
                    {% else %}
                    <input type="hidden" name="threshold" value="{{ item.threshold }}">
                    {% endif %}
                    <button type="submit" class="btn btn-forest rounded-pill fw-bold" onclick="return confirm('Save changes to this item?');">Save</button>
                    <a href="{{ url_for('inventory.item_detail', item_id=item.item_id) }}" class="btn btn-outline-forest rounded-pill fw-bold ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
