name: Python Application CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Inject CI Database Credentials
      run: |
        cat << 'EOF' > PF_LU_APP/connect_local.py
        dbuser = "postgres"
        dbpass = "${{ secrets.CI_DB_PASSWORD }}"
        dbhost = "localhost"
        dbport = "5432"
        dbname = "PF-LU"
        EOF

    - name: Set up Database
      env:
        PGPASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      run: |
        # Create the PF-LU database
        psql -h localhost -U postgres -d postgres -c "CREATE DATABASE \"PF-LU\";"
        
        # Apply the schema, seed data, and indexes
        psql -h localhost -U postgres -d "PF-LU" -f sql/create_database.sql
        psql -h localhost -U postgres -d "PF-LU" -f sql/populate_database.sql

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: |
        pytest
